name: Vertex Integration Test

on:
  schedule:
    # Run nightly at 06:00 UTC (15:00 JST)
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  vertex-smoke:
    name: Vertex Chat Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Only run if secrets are configured
    if: github.repository == 'meljunpicardal/yuku-japan'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vertex integration test
        run: npx vitest run tests/integration/vertex-chat.test.ts
        env:
          RUN_VERTEX_INTEGRATION: "1"
          GOOGLE_VERTEX_PROJECT: ${{ secrets.GOOGLE_VERTEX_PROJECT }}
          GOOGLE_VERTEX_LOCATION: ${{ secrets.GOOGLE_VERTEX_LOCATION }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
